<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Adventourist — Travel Designed For You | Mumbai-based Experiential Travel</title>
    <meta name="description" content="Premium experiential travel from Mumbai. Personalised itineraries to Bali, Ladakh, Thailand, Sri Lanka & more. Zero booking fees. 4.8★ on Google. 250+ happy families." />
    <meta name="author" content="Adventourist" />
    <meta name="theme-color" content="#FF6F4C" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Robots & AI Crawlers -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <meta name="bingbot" content="index, follow" />

    <link rel="icon" type="image/svg+xml" href="/logo/logo-square-color.svg" />
    <link rel="apple-touch-icon" href="/logo/logo-square-color.svg" />
    <link rel="canonical" href="https://adventourist.in/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Performance: preconnect / dns-prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://wa.me" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <!-- Non-blocking Google Fonts (preload + swap) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Jost:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Jost:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Jost:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      />
    </noscript>
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1600&q=70"
      fetchpriority="high"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Adventourist" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:title" content="Adventourist — Travel Designed For You" />
    <meta property="og:description" content="Premium experiential travel from Mumbai. Personalised itineraries, real experts, zero booking fees." />
    <meta property="og:url" content="https://adventourist.in/" />
    <meta property="og:image" content="https://adventourist.in/site-images/bg-home-page.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Adventourist — bespoke experiential travel from Mumbai" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@adventourist" />
    <meta name="twitter:title" content="Adventourist — Travel Designed For You" />
    <meta name="twitter:description" content="Premium experiential travel from Mumbai. Personalised itineraries, real experts, zero booking fees." />
    <meta name="twitter:image" content="https://adventourist.in/site-images/bg-home-page.jpg" />

    <!-- Organisation JSON-LD (site-wide baseline; pages may add more) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "@id": "https://adventourist.in/#org",
      "name": "Adventourist",
      "url": "https://adventourist.in/",
      "logo": "https://adventourist.in/logo/logo-square-color.svg",
      "image": "https://adventourist.in/site-images/bg-home-page.jpg",
      "description": "Mumbai-based experiential travel company designing bespoke itineraries to Bali, Ladakh, Thailand, Sri Lanka, Singapore and beyond.",
      "telephone": "+919930400694",
      "priceRange": "₹₹–₹₹₹",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1 Madhav Kunj, South Pond Road, Vile Parle",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra",
        "postalCode": "400056",
        "addressCountry": "IN"
      },
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "09:00",
        "closes": "21:00"
      }],
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.8", "reviewCount": "250" },
      "sameAs": [
        "https://www.instagram.com/adventourist.in",
        "https://www.facebook.com/adventourist.in",
        "https://www.linkedin.com/company/adventourist"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
