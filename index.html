<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Adventourist — Custom Travel Planner, Mumbai</title>
    <meta name="description" content="Mumbai-based custom travel planner. Personalised trips to Bali, Ladakh, Thailand, Sri Lanka & more. Real experts, zero booking fees, 4.8★ on Google." />
    <meta name="author" content="Adventourist" />
    <meta name="theme-color" content="#FF6F4C" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Robots & AI Crawlers -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <meta name="bingbot" content="index, follow" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="mV-P-3fuDCWTr0E0owiHB8Pe6Nd7YBLZB9HhQdG0Dg8" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <!-- Per-route canonical is set by the <SEO /> component via react-helmet-async. Avoid duplicate canonical here. -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Performance: preconnect / dns-prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://wa.me" />
    <!-- Non-blocking Google Fonts (preload + swap) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Jost:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Jost:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800&family=Jost:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      />
    </noscript>
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Adventourist" />
    <meta property="og:locale" content="en_IN" />
    <!-- Per-route og:title / og:description / og:url are set by <SEO /> via react-helmet-async.
         Sitewide fallbacks below are used only by non-JS social crawlers hitting the bare root. -->
    <meta property="og:title" content="Adventourist — Custom Travel Planner, Mumbai" />
    <meta property="og:description" content="Mumbai-based custom travel planner. Personalised trips to Bali, Ladakh, Thailand, Sri Lanka & more." />
    <meta property="og:image" content="https://www.adventourist.in/site-images/bg-home-page.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Adventourist — bespoke experiential travel from Mumbai" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@adventourist" />
    <meta name="twitter:title" content="Adventourist — Custom Travel Planner, Mumbai" />
    <meta name="twitter:description" content="Mumbai-based custom travel planner. Personalised trips to Bali, Ladakh, Thailand, Sri Lanka & more." />
    <meta name="twitter:image" content="https://www.adventourist.in/site-images/bg-home-page.jpg" />

    <!-- Organisation JSON-LD (site-wide baseline; pages may add more) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["TravelAgency", "LocalBusiness"],
      "@id": "https://www.adventourist.in/#org",
      "name": "Adventourist",
      "url": "https://www.adventourist.in/",
      "logo": "https://www.adventourist.in/logo/logo-square-color.svg",
      "image": "https://www.adventourist.in/site-images/bg-home-page.jpg",
      "description": "Mumbai-based experiential travel company designing bespoke itineraries to Bali, Ladakh, Thailand, Sri Lanka, Singapore and beyond.",
      "telephone": "+919930400694",
      "email": "support@adventourist.in",
      "priceRange": "₹₹–₹₹₹",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1 Madhav Kunj, South Pond Road, Vile Parle",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra",
        "postalCode": "400056",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 19.0998,
        "longitude": 72.8478
      },
      "areaServed": [
        { "@type": "Country", "name": "India" },
        { "@type": "AdministrativeArea", "name": "Maharashtra" },
        { "@type": "City", "name": "Mumbai" }
      ],
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "09:00",
        "closes": "21:00"
      }],
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.8", "reviewCount": "250" },
      "sameAs": [
        "https://www.instagram.com/adventourist.in",
        "https://www.facebook.com/adventourist.in",
        "https://www.linkedin.com/company/adventourist"
      ]
    }
    </script>

    <!-- WebSite + SearchAction (sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://www.adventourist.in/#website",
      "name": "Adventourist",
      "url": "https://www.adventourist.in/",
      "publisher": { "@id": "https://www.adventourist.in/#org" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.adventourist.in/trips?destination={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
